services:
  redis:
    restart: always
    image: redis:4-alpine
    sysctls:
      - net.core.somaxconn=511
    command: redis-server --maxmemory 32M --maxmemory-policy volatile-lru
    expose:
      - 6379

  nadeko:
    user: '1003:1005'
    image: stefanpuia.azurecr.io/nadeko:${TAG}
    restart: always
    depends_on:
      - redis
    environment:
      TZ: Europe/Brussels
      VERSION: "${TAG}"
    volumes:
      - /var/opt/nadeko/nadeko-backup/config-v4/creds.yml:/app/creds.yml:ro
      - /var/opt/nadeko/nadeko-backup/config-v4/data:/app/data

networks:
  default:
    driver: bridge
